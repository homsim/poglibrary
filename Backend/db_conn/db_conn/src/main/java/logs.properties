handlers=java.util.logging.FileHandler,java.util.logging.ConsoleHandler

# default file output is in user's home directory.
# -> need to create dir $HOME/.poglibrary_logs in the setup file
java.util.logging.FileHandler.level = ALL
java.util.logging.FileHandler.pattern = %h/.poglibrary_logs/pog%u.log%g.xml
java.util.logging.FileHandler.limit = 50000000
java.util.logging.FileHandler.count = 1
java.util.logging.FileHandler.formatter = java.util.logging.XMLFormatter
# java.util.logging.FileHandler.formatter = db_conn.com.poglibrary.JsonFormatter

# Limit the message that are printed on the console to INFO and above.
java.util.logging.ConsoleHandler.level = ALL
java.util.logging.ConsoleHandler.formatter = java.util.logging.SimpleFormatter

